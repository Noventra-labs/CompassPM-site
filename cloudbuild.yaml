steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/compasspm-site",
        ".",
      ]

  # Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "gcr.io/$PROJECT_ID/compasspm-site",
      ]

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "compasspm-site",
        "--image",
        "gcr.io/$PROJECT_ID/compasspm-site",
        "--region",
        "asia-south1",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--port",
        "8080",
        "--memory",
        "512Mi",
        "--cpu",
        "1",
        "--min-instances",
        "0",
        "--max-instances",
        "3",
        "--set-env-vars",
        "NODE_ENV=production",
      ]

images:
  - "gcr.io/$PROJECT_ID/compasspm-site"

options:
  logging: CLOUD_LOGGING_ONLY
